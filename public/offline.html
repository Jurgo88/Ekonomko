<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline — Rozpočet</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
        padding: 32px 24px;
        border-radius: 16px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      }
      .emoji { font-size: 48px; line-height: 1; margin-bottom: 8px; }
      h1 { font-size: 22px; margin: 8px 0 4px; font-weight: 600; }
      p { color: #94a3b8; margin: 8px 0 0; line-height: 1.5; }
      button {
        margin-top: 20px;
        padding: 10px 18px;
        border-radius: 10px;
        border: 0;
        background: #22c55e;
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
      }
      button:hover { background: #16a34a; color: #ffffff; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="emoji">📡</div>
      <h1>Si offline</h1>
      <p>
        Rozpočet momentálne nedokáže spojiť sa so serverom.<br />
        Skontroluj si pripojenie a skús to znova.
      </p>
      <button onclick="location.reload()">Skúsiť znova</button>
    </main>
  </body>
</html>
